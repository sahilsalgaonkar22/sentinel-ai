# ============================================================================
# SENTINEL AI — Full Docker Compose (Development / Demo)
#
# Usage:
#   docker compose -f docker-compose.minimal.yml --env-file .env.docker up -d --build
#
# After services are up, run migrations:
#   docker exec sentinel-gateway python -m alembic upgrade head
#
# Create MinIO bucket:
#   docker exec sentinel-minio mc mb local/sentinel-reports --ignore-existing
#
# Seed admin password:
#   docker exec sentinel-postgres psql -U sentinel -d sentinel -c \
#     "UPDATE users SET hashed_password='\$2b\$12\$LQv3c1yqBWVHxkd0LHAkCOYz6TiGqY4K7O.9AEBLQSzf3MaQnIWGa' WHERE email='admin@sentinel.ai';"
# ============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

networks:
  sentinel-net:
    driver: bridge

volumes:
  sentinel-postgres-data:
  sentinel-redis-data:
  sentinel-kafka-data:
  sentinel-minio-data:
  sentinel-es-data:
  sentinel-grafana-data:
  sentinel-prometheus-data:

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sentinel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql/data
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sentinel-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - sentinel-redis-data:/data
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── Kafka (KRaft mode — no Zookeeper) ───────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: sentinel-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - sentinel-kafka-data:/var/lib/kafka/data
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    logging: *default-logging

  # ── MinIO (S3-compatible Object Storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: sentinel-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-sentinel_admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - sentinel-minio-data:/data
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # ── MinIO Init (create bucket automatically) ────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: sentinel-minio-init
    networks:
      - sentinel-net
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-sentinel_admin} ${S3_SECRET_KEY} &&
        mc mb local/${S3_BUCKET:-sentinel-reports} --ignore-existing &&
        mc anonymous set download local/${S3_BUCKET:-sentinel-reports} &&
        echo 'MinIO bucket ready.'
      "
    restart: "no"

  # ── Elasticsearch ────────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: sentinel-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - sentinel-es-data:/usr/share/elasticsearch/data
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s
    logging: *default-logging

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: sentinel-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - sentinel-prometheus-data:/prometheus
    networks:
      - sentinel-net
    depends_on:
      - gateway
    logging: *default-logging

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: sentinel-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-S3nt1nel_Gr4fan4!Secure}
      GF_SECURITY_ADMIN_USER: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    ports:
      - "3001:3000"
    volumes:
      - sentinel-grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - sentinel-net
    depends_on:
      - prometheus
    logging: *default-logging

  # ── Gateway (FastAPI) ────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.gateway
    image: sentinel-gateway:latest
    container_name: sentinel-gateway
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    networks:
      - sentinel-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  # ── Workers (Security Scanners) ───────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    image: sentinel-worker:latest
    container_name: sentinel-worker
    restart: unless-stopped
    env_file:
      - .env.docker
    networks:
      - sentinel-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "0"   # Add root group (GID 0) — Docker Desktop socket is owned root:root
    logging: *default-logging

  # ── Frontend (React/Vite + Nginx) ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: sentinel-frontend:latest
    container_name: sentinel-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - sentinel-net
    depends_on:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging
