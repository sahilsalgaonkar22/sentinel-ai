# ============================================================================
# SENTINEL AI — AWS Secret Store (ClusterSecretStore)
# Uses IRSA (IAM Roles for Service Accounts) — no static credentials in cluster
#
# SETUP:
#   1. Create IAM role with SecretsManager:GetSecretValue permission.
#   2. Annotate the sentinel ServiceAccount with the Role ARN.
#   3. External Secrets Operator assumes the role via OIDC federation.
# ============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: sentinel-aws-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1    # Change to your region
      auth:
        jwt:
          serviceAccountRef:
            name: sentinel-external-secrets-sa
            namespace: sentinel
