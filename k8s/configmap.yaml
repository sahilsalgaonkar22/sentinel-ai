apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: sentinel
  labels:
    app.kubernetes.io/part-of: sentinel-platform
data:
  APP_NAME: "SENTINEL AI"
  APP_VERSION: "4.0.0"
  DEBUG: "false"
  SENTINEL_EXECUTION_MODE: "distributed"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.sentinel.svc.cluster.local:9092"
  REDIS_URL: "redis://redis.sentinel.svc.cluster.local:6379/0"
  ELASTICSEARCH_URL: "http://elasticsearch.sentinel.svc.cluster.local:9200"
  S3_ENDPOINT: "http://minio.sentinel.svc.cluster.local:9000"
  S3_BUCKET: "sentinel-reports"
  JWT_ALGORITHM: "HS256"
---
apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: sentinel
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://sentinel:sentinel_secure_2024@postgres.sentinel.svc.cluster.local/sentinel"
  JWT_SECRET: "super-secret-sentinel-key-2024-change-in-production"
  LLM_API_KEY: ""
  S3_ACCESS_KEY: "sentinel_admin"
  S3_SECRET_KEY: "sentinel_secret"
