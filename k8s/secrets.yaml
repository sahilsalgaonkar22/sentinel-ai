apiVersion: v1
kind: Secret
metadata:
  name: sentinel-secrets
  namespace: sentinel
type: Opaque
stringData:
  POSTGRES_PASSWORD: sentinelpass
  DATABASE_URL: postgresql+asyncpg://sentinel:sentinelpass@postgres:5432/sentinel
  JWT_SECRET: dev_jwt_secret
  SECRET_KEY: dev_secret_key
  S3_ACCESS_KEY: dev_access_key
  S3_SECRET_KEY: dev_secret_key
  SENTINEL_SMTP_PASSWORD: dev_smtp_password
  SENTINEL_SLACK_WEBHOOK: https://hooks.slack.com/services/dev/mock