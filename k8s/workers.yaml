# ============================================================================
# SENTINEL AI — Hardened Worker Deployments + HPAs
#
# FIX-6:  Advanced worker NO LONGER runs as root (uid=0)
#         Docker socket hostPath mount REMOVED — use remote execution API.
# FIX-7:  All workers now have liveness + readiness probes on port 8001.
#         Workers expose a minimal /health HTTP endpoint via a background
#         thread (WorkerBase provides this out-of-the-box).
# ============================================================================

# ─── Network Worker ──────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-worker-network
  namespace: sentinel
  labels:
    app: worker-network
    worker-type: network
    app.kubernetes.io/part-of: sentinel-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-network
  template:
    metadata:
      labels:
        app: worker-network
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: worker
        image: sentinel/worker:latest
        command: ["python", "-m", "backend.workers.network_worker"]
        ports:
        - containerPort: 8001
          name: health
        envFrom:
        - configMapRef:
            name: sentinel-config
        - secretRef:
            name: sentinel-secrets
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # nmap writes temp XML files
          capabilities:
            drop: ["ALL"]
            add: ["NET_RAW", "NET_ADMIN"]  # Required for nmap raw sockets
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        # FIX-7: liveness + readiness probes
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 5
          periodSeconds: 15
          failureThreshold: 2
          timeoutSeconds: 3
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
