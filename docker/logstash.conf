input {
  kafka {
    bootstrap_servers => "kafka:29092"
    topics => ["scan.logs"]
    group_id => "logstash-consumer"
    consumer_threads => 2
    decorate_events => true
    codec => json
  }
}

filter {
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "sentinel-scan-logs"
    }
    rename => {
      "scan_id" => "[scan][id]"
      "tool" => "[scan][tool]"
      "level" => "[log][level]"
      "message" => "[log][message]"
    }
  }

  if [log][level] == "ERROR" {
    mutate {
      add_tag => ["error"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "sentinel-scan-logs-%{+YYYY.MM.dd}"
    document_id => "%{[@metadata][kafka][offset]}-%{[@metadata][kafka][topic]}-%{[@metadata][kafka][partition]}"
  }

  stdout {
    codec => rubydebug
  }
}
